<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Smart Parking">
    <meta name="description" content="Smart Parking System with Xperanti Sensors - Real-time parking management">
    
    <title>Timed Parking Sensor Simulation</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        .dashboard-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .bay-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
            margin-bottom: 15px;
        }
        
        .bay-card:active {
            transform: scale(0.98);
        }
        
        .bay-available {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .bay-occupied {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .bay-violation {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(235, 51, 73, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(235, 51, 73, 0); }
            100% { box-shadow: 0 0 0 0 rgba(235, 51, 73, 0); }
        }
        
        .timer-display {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 14px;
        }
        
        .progress {
            height: 6px;
            border-radius: 10px;
        }
        
        .notification-toast {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 9999;
            min-width: 280px;
            max-width: 350px;
        }
        
        .stats-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        
        .enforcer-alert {
            background: #ff4757;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 50px;
            padding: 12px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 10000;
            display: none;
            align-items: center;
            gap: 15px;
            border: 2px solid #667eea;
        }
        
        .offline-indicator {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4757;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10001;
            display: none;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: #667eea;
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s;
        }
        
        .refresh-button:active {
            transform: scale(0.9);
        }
        
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            
            .dashboard-container {
                padding: 10px;
                border-radius: 15px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .stats-card h3 {
                font-size: 18px;
            }
            
            .bay-card {
                margin-bottom: 10px;
            }
            
            .bay-card .card-body {
                padding: 10px;
            }
            
            .bay-card h5 {
                font-size: 16px;
                margin-bottom: 5px;
            }
            
            .timer-display {
                font-size: 11px;
            }
        }
        
        /* Pull-to-refresh indicator */
        .ptr-indicator {
            text-align: center;
            padding: 10px;
            color: white;
            display: none;
        }
        
        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Offline Indicator -->
    <div class="offline-indicator" id="offlineIndicator">
        <i class="bi bi-wifi-off"></i>
        <span>You're offline - Data syncing when online</span>
    </div>
    
    <!-- Install PWA Prompt -->
    <div class="install-prompt" id="installPrompt">
        <i class="bi bi-download" style="font-size: 24px;"></i>
        <span>Install Smart Parking App</span>
        <button class="btn btn-primary btn-sm" onclick="installPWA()">Install</button>
        <button class="btn btn-link btn-sm" onclick="dismissInstall()">Later</button>
    </div>
    
    <!-- Refresh Button -->
    <button class="refresh-button" onclick="syncData()" id="refreshBtn">
        <i class="bi bi-arrow-clockwise"></i>
    </button>

    <div class="dashboard-container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="display-6">
                <i class="bi bi-p-square-fill"></i> Smart Parking
                <span class="badge bg-info ms-2">PWA</span>
            </h1>
            <div>
                <button class="btn btn-primary me-2" onclick="simulateRandomCar()">
                    <i class="bi bi-car-front"></i> <span class="d-none d-sm-inline">Simulate</span>
                </button>
                <button class="btn btn-warning" onclick="resetAllBays()">
                    <i class="bi bi-arrow-clockwise"></i> <span class="d-none d-sm-inline">Reset</span>
                </button>
            </div>
        </div>

        <!-- Statistics -->
        <div class="row mb-3">
            <div class="col-3">
                <div class="stats-card text-center">
                    <h3 id="totalBays">8</h3>
                    <p class="text-muted mb-0 small">Total</p>
                </div>
            </div>
            <div class="col-3">
                <div class="stats-card text-center">
                    <h3 class="text-success" id="availableBays">8</h3>
                    <p class="text-muted mb-0 small">Free</p>
                </div>
            </div>
            <div class="col-3">
                <div class="stats-card text-center">
                    <h3 class="text-warning" id="occupiedBays">0</h3>
                    <p class="text-muted mb-0 small">Used</p>
                </div>
            </div>
            <div class="col-3">
                <div class="stats-card text-center">
                    <h3 class="text-danger" id="violationCount">0</h3>
                    <p class="text-muted mb-0 small">Alert</p>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Parking Bays Grid -->
            <div class="col-md-8">
                <h5 class="mb-2">Parking Bays</h5>
                <div class="row" id="baysGrid">
                    <!-- Bays will be dynamically generated -->
                </div>
            </div>

            <!-- Enforcer Panel -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-danger text-white py-2">
                        <h6 class="mb-0">
                            <i class="bi bi-shield-fill"></i> Enforcer Panel
                            <span class="badge bg-light text-dark ms-2" id="alertBadge">0</span>
                        </h6>
                    </div>
                    <div class="card-body" style="max-height: 400px; overflow-y: auto;" id="enforcerPanel">
                        <p class="text-muted text-center small">No active violations</p>
                    </div>
                    <div class="card-footer p-2">
                        <button class="btn btn-success btn-sm w-100" onclick="compoundAllViolations()">
                            <i class="bi bi-check-circle"></i> Compound All
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Sessions Table -->
        <div class="row mt-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-primary text-white py-2">
                        <h6 class="mb-0">Active Sessions</h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th>Bay</th>
                                        <th>Type</th>
                                        <th>Time</th>
                                        <th>Status</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="activeSessionsTable">
                                    <tr>
                                        <td colspan="5" class="text-center text-muted">No active sessions</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-toast" id="notificationContainer"></div>
    
    <!-- Audio Element for Alerts -->
    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-4.0.0-beta.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Main Application Script -->
    <script src="app.js"></script>
    
    <!-- PWA Registration -->
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful:', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed:', err);
                    });
            });
        }
        
        // PWA Install Prompt
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Show install prompt after 3 seconds
            setTimeout(() => {
                if (localStorage.getItem('pwaInstalled') !== 'true') {
                    document.getElementById('installPrompt').style.display = 'flex';
                }
            }, 3000);
        });
        
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                        localStorage.setItem('pwaInstalled', 'true');
                    }
                    deferredPrompt = null;
                    document.getElementById('installPrompt').style.display = 'none';
                });
            }
        }
        
        function dismissInstall() {
            document.getElementById('installPrompt').style.display = 'none';
            localStorage.setItem('pwaInstallDismissed', Date.now());
        }
        
        // Check online/offline status
        window.addEventListener('online', () => {
            document.getElementById('offlineIndicator').style.display = 'none';
            syncData();
            showNotification('Back online - Syncing data', 'success');
        });
        
        window.addEventListener('offline', () => {
            document.getElementById('offlineIndicator').style.display = 'flex';
            showNotification('You are offline - Data will be saved locally', 'warning');
        });
        
        // Sync data when online
        function syncData() {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.innerHTML = '<span class="loading-spinner"></span>';
            
            setTimeout(() => {
                refreshData();
                refreshBtn.innerHTML = '<i class="bi bi-arrow-clockwise"></i>';
                showNotification('Data synchronized', 'success');
            }, 1000);
        }
        
        // Check if installed as PWA
        if (window.matchMedia('(display-mode: standalone)').matches) {
            localStorage.setItem('pwaInstalled', 'true');
            console.log('Running as installed PWA');
        }
    </script>
</body>
</html>
